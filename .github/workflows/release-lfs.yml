name: Release LFS

on:
  release:
    types: [published]

jobs:
  upload-lfs-asset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: "true"

      - name: Pull LFS files
        run: git lfs pull

      - name: Upload FitGen.exe LFS file to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./FitGen.exe
          asset_name: FitGen.exe
          asset_content_type: application/octet-stream

      - name: Upload fitgen-linux-x64 LFS file to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./fitgen-linux-x64
          asset_name: fitgen-linux-x64
          asset_content_type: application/octet-stream
